menu:
  首页:
    path: /
    icon: home
  归档:
    path: /archives/
    icon: archive
  友链:
    path: /links/
    icon: link
  分类:
    path: /categories/
    icon: folder
  标签:
    path: /tags/
    icon: tag
  关于:
    path: /about/
    icon: user

profile:
  name: FlatPaper
  role: 日常记录
  bio: 介绍一下自己 — 一两句话，写写你想被别人记住的部分。
  # 头像图片路径（站点根的 source/ 目录下）。留空则使用 CSS 绘制的默认头像。
  avatar: 

social:
  GitHub: https://github.com/
  Twitter: https://twitter.com/
  Email: mailto:you@example.com

# 在 socials 区域追加一个 RSS 图标（需要装 hexo-generator-feed 并在站点 _config.yml 启用 feed）
rss:
  enable: true
  path: atom.xml

welcome:
  label: 今日份记录
  title: 把日子，慢慢写下来
  text: 记一些小事。
  cta_text: 开始阅读
  cta_link: archives/

excerpt_length: 96
recent_posts: 5

# 前端搜索索引上限（0 或留空 = 不限）。文章很多时调小可减小首屏 JSON 体积。
search:
  limit: 0

# 标签样式： tape | pill
tags:
  style: tape

# 首页轮播置顶（最多 4 项；按文章 slug / 路径 / 标题任一匹配）
featured:
  # - hello-world
  # - markdown-elements-showcase
  # - 2026/05/09/weekend-photowalk-notes

# 轮播自动播放（毫秒，0 表示关闭）
featured_autoplay: 5000

# 胶带装饰总开关
tape:
  enable: true

# 页脚（支持 HTML；{year} 会被替换成当前年份，{name} 替换为 theme.profile.name）
footer:
  left: '© {year} FlatPaper. All rights reserved.'
  right: 'Made with ❤ by {name}'

# 代码块外观主题： dark | sand | light
code:
  theme: dark
