menu:
  首页:
    path: /
    icon: home
  归档:
    path: /archives/
    icon: archive
  友链:
    path: /links/
    icon: link
  分类:
    path: /categories/
    icon: folder
  标签:
    path: /tags/
    icon: tag
  关于:
    path: /about/
    icon: user

profile:
  # 作者名直接取站点 _config.yml 的 author 字段；这里不再重复配置
  role: 日常记录
  bio: 介绍一下自己 — 一两句话，写写你想被别人记住的部分。
  # 头像图片路径（站点根的 source/ 目录下）。留空则使用 CSS 绘制的默认头像。
  avatar:

social:
  GitHub: https://github.com/
  Twitter: https://twitter.com/
  Email: mailto:you@example.com

# 在 socials 区域追加一个 RSS 图标（需要装 hexo-generator-feed 并在站点 _config.yml 启用 feed）
rss:
  enable: true
  path: atom.xml

welcome:
  label: 今日份记录
  title: 把日子，慢慢写下来
  text: 记一些小事。
  cta_text: 开始阅读
  cta_link: archives/

excerpt_length: 96
recent_posts: 5

# 前端搜索索引上限（0 或留空 = 不限）。文章很多时调小可减小首屏 JSON 体积。
search:
  limit: 0

# 标签样式： tape | pill
tags:
  style: tape

# 首页轮播置顶（最多 4 项；按文章 slug / 路径 / 标题任一匹配）
featured:
  # - hello-world
  # - markdown-elements-showcase
  # - 2026/05/09/weekend-photowalk-notes

# 轮播自动播放（毫秒，0 表示关闭）
featured_autoplay: 5000

# 胶带装饰总开关
tape:
  enable: true

# 页脚（支持 HTML；占位符：{year}=当前年份，{name}=站点 _config.yml 的 author，{theme}=主题署名链接）
# 想去掉主题署名直接删掉 {theme} 即可
# 不配置 footer 时默认：左 "© {year} {author}"，右 "Powered by Theme FlatPaper"
footer:
  left: '© {year} By {name}'
  right: 'Powered by Theme {theme}'

# 代码块外观主题： dark | sand | light
code:
  theme: dark

# Umami 网站统计（https://umami.is）
# enable 为 true 时，会在每个页面 </head> 前注入 Umami tracker：
#   <script defer src="https://<host>/script.js" data-website-id="<website_id>" [data-domains="..."]></script>
# host       Umami 服务的域名（不含协议、不含路径），例如 analytics.example.com
# website_id 后台为站点生成的 UUID
# domains    可选，逗号分隔或 YAML 列表，仅在这些域名下上报；用来过滤 localhost / 预览域名 / 被拷贝部署到其他域的情况
umami:
  enable: false
  host:                                 # 例如：analytics.example.com
  website_id:                           # 例如：xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
  # domains: example.com,www.example.com

# Twikoo 评论（https://twikoo.js.org）
# 需自行部署后端：https://twikoo.js.org/quick-start.html
# 仅文章页渲染评论区；单篇可在 front-matter 用 `comments: false` 关闭。
twikoo:
  enable: false
  envId:                                # Twikoo 后端 URL，例如：https://twikoo.example.com
  # cdn:                                # 可选；覆盖默认 jsDelivr CDN（私有镜像 / 企业 CDN）
